# .pre-commit-config.yaml — ACE core.
#
# ACE core is developed in the open, so the checks that used to run at export
# time run here, before a commit can land in the public repo. The secret scan is
# the load-bearing one: it blocks a credential from ever reaching a public tree.
#
# Install once:  pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
  - repo: local
    hooks:
      - id: secret-scan
        name: secret scan (no credentials in the open)
        entry: python scripts/secret_scan.py
        language: system
        pass_filenames: true
        stages: [pre-commit]
