name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Run ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

  test:
    name: Tests (fast gate)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Run fast tests (no e2e)
        run: uv run pytest -m "not e2e" -q --tb=short

  naked-kernel:
    name: Naked kernel (zero extensions)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Kernel tests with all extensions disabled
        run: |
          ACE_DISABLE_EXTENSIONS=1 uv run pytest -m "not e2e and not requires_extensions" -q --tb=short
          uv run pytest tests/test_kernel_boundary.py -q

  canvas:
    name: Canvas (core/ui/canvas)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install canvas dependencies
        working-directory: core/ui/canvas
        run: npm ci
      - name: Typecheck
        working-directory: core/ui/canvas
        run: npx tsc --noEmit
      # Vitest includes the TS kernel-boundary guard
      # (src/design/__enforcement__/noExtensionLeakage.test.ts) — the UI sibling
      # of tests/test_kernel_boundary.py. With no extensions present it confirms
      # no src file imports from extensions/ or names an extension brand.
      - name: Vitest
        working-directory: core/ui/canvas
        run: npx vitest run --reporter=basic
      # NAKED posture is the ONLY posture in the public tree: no src/app/ext/
      # extension wiring is present — import.meta.glob finds nothing and the
      # canvas mounts kernel routes alone.
      - name: Build (naked posture — zero extensions)
        working-directory: core/ui/canvas
        run: npx vite build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Vulnerability scan (pip-audit)
        # No suppressions: the tree audits clean. (CVE-2025-3000 was fixed by
        # torch 2.13; the former --ignore-vuln for it is gone. If a future
        # advisory has no fix, add an explicit --ignore-vuln here with a reason.)
        run: uv run pip-audit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build --no-cache -t ace-engine:ci .
      - name: Verify health endpoint exists in image
        run: |
          docker run --rm -d --name ace-ci -p 3999:3000 ace-engine:ci || true
          sleep 5
          docker stop ace-ci 2>/dev/null || true
